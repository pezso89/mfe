name: deploy-auth
env:
  BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
  run: echo "A név hossza ${{ secrets.AWS_S3_BUCKET_NAME }}" | wc -c
on:
  push:
    branches: [main, master]
    paths:
      - "packages/auth/**"

defaults:
  run:
    working-directory: packages/auth
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24.12.0"

      - name: Install dependencies
        run: npm install

      - name: Build the container app
        run: npm run build
        env:
          PROD_DOMAIN: ${{ secrets.PROD_DOMAIN }}

      - uses: shinyinc/action-aws-cli@v1.2
      - run: aws s3 sync dist s3://${{ secrets.AWS_S3_BUCKET_NAME }}/auth/latest
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-central-1
      - run: aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_DISTRIBUTION_ID }} --paths "/auth/latest/remoteEntry.js"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-central-1
