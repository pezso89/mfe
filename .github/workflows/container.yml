name: CI/CD Build and Deploy to S3

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Forráskód letöltése
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. ELLENŐRZÉS: Itt nézzük meg, üres-e a bucket név
      # Ha a szám nagyobb mint 1, akkor a secret létezik és be van töltve.
      - name: Check if S3 Bucket Name secret is set
        run: |
          echo -n "A bucket név hossza: "
          echo "${{ secrets.AWS_S3_BUCKET_NAME }}" | wc -c

      # 3. Node.js környezet beállítása
      - name: Install dependencies
        run: npm install

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.12.0"

      # 4. Függőségek telepítése
      - name: Install dependencies
        run: npm install

      # 5. A projekt buildelése
      - name: Build project
        run: npm run build

      # 6. AWS hitelesítés
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      # 7. Feltöltés S3-ra
      - name: Deploy to S3
        run: |
          aws s3 sync ./dist s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete
